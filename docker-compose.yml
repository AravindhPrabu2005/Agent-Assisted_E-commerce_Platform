name: ekadai

services:
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    environment:
      IS_PERSISTENT: "TRUE"
    volumes:
      - ./infra/chroma/chroma:/data
    restart: unless-stopped

  server:
    build:
      context: ./server
    container_name: ekadai-server
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    depends_on:
      - chromadb
    restart: unless-stopped